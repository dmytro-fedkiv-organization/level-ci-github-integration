name: Playwright Tests

on: [push, pull_request]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install
        env:
          LEVEL_ACCESS_NPM_TOKEN: ${{ secrets.LEVEL_ACCESS_NPM_TOKEN }}

      - name: Start HTTP server
        run: npx http-server src -p 3000 &

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          LEVEL_CI_USERNAME: ${{ secrets.LEVEL_CI_USERNAME }}
          LEVEL_CI_PASSWORD: ${{ secrets.LEVEL_CI_PASSWORD }}

      - name: Level CI Accessibility Analysis
        uses: UserWayOrg/cicd-action@dev
        env:
          LEVEL_CI_TOKEN: ${{ secrets.LEVEL_CI_TOKEN }}
